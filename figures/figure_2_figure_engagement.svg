<svg viewBox="0 0 720 580" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="figbtitle figbdesc" style="font-family: 'Calibri', 'Segoe UI', Roboto, sans-serif;">
  <title id="figbtitle">Engagement with 30 canonical creativity-research figures across 53,792-paper corpus</title>
  <desc id="figbdesc">Grouped chart showing engagement status of 30 canonical creativity-research figures. Three substantive engagements at biology-AI-philosophy frontier (Chalmers, Latour twice). Eleven figures appear in passing references only. Nineteen figures have zero corpus citations. Pattern stable across v1, v2, v3 corpus expansions.</desc>

  <!-- Background -->
  <rect width="720" height="580" fill="#FAF9F4"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-size="16" fill="#2C2C2A" font-weight="500">Engagement with 30 canonical creativity-research figures</text>
  <text x="360" y="48" text-anchor="middle" font-size="11" fill="#5F5E5A">v3 corpus: 53,792 papers (drug-discovery AI + adjacent methodology); 22 papers (0.041%) cite at least one figure</text>

  <!-- Three-tier structure -->

  <!-- Tier 1: Substantive engagements (3) -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="640" height="100" fill="none" stroke="#2C7048" stroke-width="1.5" rx="6"/>
    <text x="14" y="22" font-size="13" fill="#2C7048" font-weight="600">Substantive engagements (3 papers)</text>
    <text x="14" y="40" font-size="10" fill="#5F5E5A" font-style="italic">All philosophy / epistemology framings; none in core methodology</text>

    <!-- The 3 substantive cases -->
    <g transform="translate(20, 56)">
      <rect x="0" y="0" width="195" height="36" fill="#3E9166" stroke="#2C7048" stroke-width="0.8" rx="4"/>
      <text x="98" y="14" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Chalmers</text>
      <text x="98" y="28" text-anchor="middle" font-size="9" fill="#fff" font-style="italic">extended-mind in AI-DD epistemology</text>

      <rect x="205" y="0" width="195" height="36" fill="#3E9166" stroke="#2C7048" stroke-width="0.8" rx="4"/>
      <text x="303" y="14" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Latour</text>
      <text x="303" y="28" text-anchor="middle" font-size="9" fill="#fff" font-style="italic">molecular-recognition philosophy</text>

      <rect x="410" y="0" width="195" height="36" fill="#3E9166" stroke="#2C7048" stroke-width="0.8" rx="4"/>
      <text x="508" y="14" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Latour</text>
      <text x="508" y="28" text-anchor="middle" font-size="9" fill="#fff" font-style="italic">OMICS systems-science editorial</text>
    </g>
  </g>

  <!-- Tier 2: Passing references (11 figures appear, 19 with zero) -->
  <g transform="translate(40, 200)">
    <rect x="0" y="0" width="640" height="120" fill="none" stroke="#BA7517" stroke-width="1.5" rx="6"/>
    <text x="14" y="22" font-size="13" fill="#BA7517" font-weight="600">Passing references (11 of 30 figures appear in corpus)</text>
    <text x="14" y="40" font-size="10" fill="#5F5E5A" font-style="italic">All in materials-science, GenAI-methodology, network-biology, or synthetic-biology contexts; none as creativity-framework adoptions</text>

    <!-- 11 figures arranged as labeled chips -->
    <g transform="translate(20, 56)" font-size="10" fill="#7B5018">
      <!-- Original 11 that appear (3) -->
      <rect x="0" y="0" width="60" height="22" fill="#FFEFD9" stroke="#BA7517" stroke-width="0.8" rx="3"/>
      <text x="30" y="15" text-anchor="middle">Boden</text>

      <rect x="68" y="0" width="60" height="22" fill="#FFEFD9" stroke="#BA7517" stroke-width="0.8" rx="3"/>
      <text x="98" y="15" text-anchor="middle">Lakatos</text>

      <rect x="136" y="0" width="60" height="22" fill="#FFEFD9" stroke="#BA7517" stroke-width="0.8" rx="3"/>
      <text x="166" y="15" text-anchor="middle">Levin</text>

      <!-- Extensions that appear (8 figures, with Kauffman+Kaufman shown together as one "name") -->
      <rect x="208" y="0" width="56" height="22" fill="#FFEFD9" stroke="#BA7517" stroke-width="0.8" rx="3"/>
      <text x="236" y="15" text-anchor="middle">Simon</text>

      <rect x="272" y="0" width="60" height="22" fill="#FFEFD9" stroke="#BA7517" stroke-width="0.8" rx="3"/>
      <text x="302" y="15" text-anchor="middle">Newell</text>

      <rect x="340" y="0" width="78" height="22" fill="#FFEFD9" stroke="#BA7517" stroke-width="0.8" rx="3"/>
      <text x="379" y="15" text-anchor="middle">Alexander</text>

      <rect x="426" y="0" width="56" height="22" fill="#FFEFD9" stroke="#BA7517" stroke-width="0.8" rx="3"/>
      <text x="454" y="15" text-anchor="middle">Stokes</text>

      <rect x="490" y="0" width="56" height="22" fill="#FFEFD9" stroke="#BA7517" stroke-width="0.8" rx="3"/>
      <text x="518" y="15" text-anchor="middle">Clark</text>

      <rect x="554" y="0" width="56" height="22" fill="#FFEFD9" stroke="#BA7517" stroke-width="0.8" rx="3"/>
      <text x="582" y="15" text-anchor="middle">Kauffman</text>

      <!-- Second row: 2 more  -->
      <rect x="0" y="30" width="78" height="22" fill="#FFEFD9" stroke="#BA7517" stroke-width="0.8" rx="3"/>
      <text x="39" y="45" text-anchor="middle">Feyerabend</text>

      <rect x="86" y="30" width="60" height="22" fill="#FFEFD9" stroke="#BA7517" stroke-width="0.8" rx="3"/>
      <text x="116" y="45" text-anchor="middle">Chalmers*</text>

      <text x="155" y="45" font-size="9" fill="#5F5E5A" font-style="italic">* also appears in substantive tier above</text>
    </g>
  </g>

  <!-- Tier 3: Zero citations -->
  <g transform="translate(40, 340)">
    <rect x="0" y="0" width="640" height="160" fill="none" stroke="#A33E3E" stroke-width="1.5" rx="6"/>
    <text x="14" y="22" font-size="13" fill="#A33E3E" font-weight="600">Zero corpus citations (19 of 30 figures)</text>
    <text x="14" y="40" font-size="10" fill="#5F5E5A" font-style="italic">Including foundational creativity-process figures the field would be expected to cite if it engaged with creativity research</text>

    <g transform="translate(20, 56)" font-size="10" fill="#6B2828">
      <!-- Row 1 -->
      <rect x="0" y="0" width="64" height="22" fill="#F7DDDD" stroke="#A33E3E" stroke-width="0.8" rx="3"/>
      <text x="32" y="15" text-anchor="middle">Wiggins</text>

      <rect x="72" y="0" width="76" height="22" fill="#F7DDDD" stroke="#A33E3E" stroke-width="0.8" rx="3"/>
      <text x="110" y="15" text-anchor="middle">Hofstadter</text>

      <rect x="156" y="0" width="60" height="22" fill="#F7DDDD" stroke="#A33E3E" stroke-width="0.8" rx="3"/>
      <text x="186" y="15" text-anchor="middle">Wallas</text>

      <rect x="224" y="0" width="120" height="22" fill="#F7DDDD" stroke="#A33E3E" stroke-width="0.8" rx="3"/>
      <text x="284" y="15" text-anchor="middle">Csikszentmihalyi</text>

      <rect x="352" y="0" width="60" height="22" fill="#F7DDDD" stroke="#A33E3E" stroke-width="0.8" rx="3"/>
      <text x="382" y="15" text-anchor="middle">Gentner</text>

      <rect x="420" y="0" width="116" height="22" fill="#F7DDDD" stroke="#A33E3E" stroke-width="0.8" rx="3"/>
      <text x="478" y="15" text-anchor="middle">Fauconnier-Turner</text>

      <rect x="544" y="0" width="68" height="22" fill="#F7DDDD" stroke="#A33E3E" stroke-width="0.8" rx="3"/>
      <text x="578" y="15" text-anchor="middle">Koestler</text>

      <!-- Row 2 -->
      <rect x="0" y="30" width="120" height="22" fill="#F7DDDD" stroke="#A33E3E" stroke-width="0.8" rx="3"/>
      <text x="60" y="45" text-anchor="middle">Finke-Ward-Smith</text>

      <rect x="128" y="30" width="64" height="22" fill="#F7DDDD" stroke="#A33E3E" stroke-width="0.8" rx="3"/>
      <text x="160" y="45" text-anchor="middle">Amabile</text>

      <rect x="200" y="30" width="76" height="22" fill="#F7DDDD" stroke="#A33E3E" stroke-width="0.8" rx="3"/>
      <text x="238" y="45" text-anchor="middle">Sternberg</text>

      <rect x="284" y="30" width="76" height="22" fill="#F7DDDD" stroke="#A33E3E" stroke-width="0.8" rx="3"/>
      <text x="322" y="45" text-anchor="middle">Campbell</text>

      <rect x="368" y="30" width="76" height="22" fill="#F7DDDD" stroke="#A33E3E" stroke-width="0.8" rx="3"/>
      <text x="406" y="45" text-anchor="middle">Simonton</text>

      <rect x="452" y="30" width="60" height="22" fill="#F7DDDD" stroke="#A33E3E" stroke-width="0.8" rx="3"/>
      <text x="482" y="45" text-anchor="middle">Schön</text>

      <rect x="520" y="30" width="76" height="22" fill="#F7DDDD" stroke="#A33E3E" stroke-width="0.8" rx="3"/>
      <text x="558" y="45" text-anchor="middle">Altshuller</text>

      <!-- Row 3 -->
      <rect x="0" y="60" width="68" height="22" fill="#F7DDDD" stroke="#A33E3E" stroke-width="0.8" rx="3"/>
      <text x="34" y="75" text-anchor="middle">Hutchins</text>

      <rect x="76" y="60" width="106" height="22" fill="#F7DDDD" stroke="#A33E3E" stroke-width="0.8" rx="3"/>
      <text x="129" y="75" text-anchor="middle">Knorr-Cetina</text>

      <rect x="190" y="60" width="50" height="22" fill="#F7DDDD" stroke="#A33E3E" stroke-width="0.8" rx="3"/>
      <text x="215" y="75" text-anchor="middle">Kuhn</text>

      <rect x="248" y="60" width="68" height="22" fill="#F7DDDD" stroke="#A33E3E" stroke-width="0.8" rx="3"/>
      <text x="282" y="75" text-anchor="middle">Kaufman</text>

      <rect x="324" y="60" width="60" height="22" fill="#F7DDDD" stroke="#A33E3E" stroke-width="0.8" rx="3"/>
      <text x="354" y="75" text-anchor="middle">Runco</text>
    </g>

    <!-- Kuhn callout -->
    <g transform="translate(396, 410)">
      <rect x="0" y="-22" width="244" height="50" fill="#fff" stroke="#A33E3E" stroke-width="1" rx="4"/>
      <text x="10" y="-6" font-size="10" fill="#A33E3E" font-weight="600">Kuhn parallel-vocabulary finding</text>
      <text x="10" y="9" font-size="10" fill="#2C2C2A">"paradigm shift" in 411 corpus abstracts</text>
      <text x="10" y="22" font-size="10" fill="#2C2C2A" font-weight="600">→ zero Kuhn citations among them</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="360" y="556" text-anchor="middle" font-size="9" fill="#888780" font-style="italic">Source: bibliometric_findings_v3.md (OpenAlex; 2017-2026; 30-figure set)</text>
  <text x="360" y="569" text-anchor="middle" font-size="9" fill="#888780" font-style="italic">Status thresholds: substantive = framework engagement; passing = mention without framework adoption; zero = no corpus citation</text>
</svg>
